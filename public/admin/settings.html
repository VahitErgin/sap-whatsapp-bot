<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ayarlar – SAP WA Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <i class="bi bi-robot sidebar-logo"></i>
      <div>
        <div class="sidebar-title">SAP WA Bot</div>
        <div class="sidebar-sub">Yönetim Paneli</div>
      </div>
    </div>
    <nav>
      <a href="/admin"           class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="/admin/approvers" class="nav-link"><i class="bi bi-people"></i> Onay Yetkilileri</a>
      <a href="/admin/templates" class="nav-link"><i class="bi bi-chat-square-text"></i> Şablonlar</a>
      <a href="/admin/settings"  class="nav-link active"><i class="bi bi-gear"></i> Ayarlar</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout" style="color:rgba(255,100,100,.7);text-decoration:none;font-size:.8rem">
        <i class="bi bi-box-arrow-right me-1"></i>Çıkış Yap
      </a>
    </div>
  </div>

  <!-- İçerik -->
  <div id="content">
    <div class="page-header">
      <h4><i class="bi bi-gear me-2" style="color:#6cb2eb"></i>Ayarlar</h4>
    </div>

    <div id="saveAlert" class="alert py-2 d-none mb-3"></div>

    <div class="row g-3">

      <!-- SAP Bağlantı -->
      <div class="col-12">
        <div class="card">
          <div class="card-header"><i class="bi bi-database me-2"></i>SAP Service Layer Bağlantısı</div>
          <div class="card-body">
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <div class="small text-muted mb-1">URL</div>
                <div class="fw-semibold" id="sapUrl">—</div>
              </div>
              <div class="col-md-2">
                <div class="small text-muted mb-1">Varsayılan DB</div>
                <div class="fw-semibold" id="sapDb">—</div>
              </div>
              <div class="col-md-2">
                <div class="small text-muted mb-1">Kullanıcı</div>
                <div class="fw-semibold">manager</div>
              </div>
              <div class="col-md-4">
                <div class="small text-muted mb-1">Tanımlı DB Listesi</div>
                <div id="sapDbs">—</div>
              </div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div>
                <label class="form-label fw-semibold small mb-1">Test Edilecek DB</label>
                <select class="form-select form-select-sm" id="testDbSelect" style="width:200px"></select>
              </div>
              <div class="mt-3">
                <button class="btn btn-primary btn-sm" onclick="testSap()" id="testBtn">
                  <i class="bi bi-play-circle me-1"></i>Bağlantıyı Test Et
                </button>
              </div>
              <div class="mt-3" id="testResult"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- WhatsApp API -->
      <div class="col-12">
        <div class="card">
          <div class="card-header"><i class="bi bi-whatsapp me-2" style="color:#25d366"></i>WhatsApp Business API</div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold small">Phone Number ID</label>
                <input type="text" class="form-control form-control-sm" id="waPhoneId" placeholder="104179379317345">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold small">Verify Token</label>
                <input type="text" class="form-control form-control-sm" id="waVerify" placeholder="endeks-wa-2024">
              </div>
              <div class="col-md-4">
                <label class="form-label fw-semibold small">
                  Access Token
                  <span class="text-muted fw-normal">(boş bırakırsan değişmez)</span>
                </label>
                <div class="input-group input-group-sm">
                  <input type="password" class="form-control" id="waToken" placeholder="EAAxxxx...">
                  <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('waToken',this)">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="form-text" id="waTokenStatus"></div>
              </div>
              <div class="col-12">
                <button class="btn btn-primary btn-sm" onclick="saveSettings()">
                  <i class="bi bi-floppy me-1"></i>WhatsApp Ayarlarını Kaydet
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- SQL Veritabanı -->
      <div class="col-12">
        <div class="card">
          <div class="card-header"><i class="bi bi-server me-2"></i>SAP SQL Veritabanı (Direkt Bağlantı)</div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label fw-semibold small">Sunucu</label>
                <input type="text" class="form-control form-control-sm" id="sqlServer" placeholder="ENDEKSDC-02.endeks.local">
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold small">Veritabanı Adı</label>
                <input type="text" class="form-control form-control-sm" id="sqlDb" placeholder="TestEndeks011225">
              </div>
              <div class="col-md-2">
                <label class="form-label fw-semibold small">Kullanıcı</label>
                <input type="text" class="form-control form-control-sm" id="sqlUser" placeholder="sa">
              </div>
              <div class="col-md-3">
                <label class="form-label fw-semibold small">
                  Şifre
                  <span class="text-muted fw-normal">(boş bırakırsan değişmez)</span>
                </label>
                <div class="input-group input-group-sm">
                  <input type="password" class="form-control" id="sqlPassword" placeholder="••••••••">
                  <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('sqlPassword',this)">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
                <div class="form-text" id="sqlPasswordStatus"></div>
              </div>
              <div class="col-12 d-flex gap-2 align-items-center">
                <button class="btn btn-primary btn-sm" onclick="saveSqlSettings()">
                  <i class="bi bi-floppy me-1"></i>SQL Ayarlarını Kaydet
                </button>
                <button class="btn btn-outline-secondary btn-sm" onclick="testSqlDb()" id="testSqlBtn">
                  <i class="bi bi-play-circle me-1"></i>Bağlantıyı Test Et
                </button>
                <span id="sqlTestResult"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Anthropic API -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header"><i class="bi bi-cpu me-2"></i>Claude AI (Anthropic)</div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label fw-semibold small">
                API Key
                <span class="text-muted fw-normal">(boş bırakırsan değişmez)</span>
              </label>
              <div class="input-group input-group-sm">
                <input type="password" class="form-control" id="anthropicKey" placeholder="sk-ant-...">
                <button class="btn btn-outline-secondary" type="button" onclick="toggleVis('anthropicKey',this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
              <div class="form-text" id="anthropicKeyStatus"></div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="saveAnthropicKey()">
              <i class="bi bi-floppy me-1"></i>API Key Kaydet
            </button>
          </div>
        </div>
      </div>

      <!-- Şifre Değiştir -->
      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header"><i class="bi bi-key me-2"></i>Panel Şifresi</div>
          <div class="card-body">
            <div id="pwAlert" class="alert py-2 d-none"></div>
            <div class="mb-2">
              <label class="form-label fw-semibold small">Mevcut Şifre</label>
              <input type="password" class="form-control form-control-sm" id="curPw">
            </div>
            <div class="mb-2">
              <label class="form-label fw-semibold small">Yeni Şifre</label>
              <input type="password" class="form-control form-control-sm" id="newPw">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Yeni Şifre (Tekrar)</label>
              <input type="password" class="form-control form-control-sm" id="newPw2">
            </div>
            <button class="btn btn-primary btn-sm" onclick="changePassword()">
              <i class="bi bi-check-lg me-1"></i>Şifreyi Güncelle
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function toggleVis(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isPass = inp.type === 'password';
  inp.type = isPass ? 'text' : 'password';
  btn.innerHTML = isPass ? '<i class="bi bi-eye-slash"></i>' : '<i class="bi bi-eye"></i>';
}

function showAlert(msg, type = 'success') {
  const el = document.getElementById('saveAlert');
  el.textContent = msg;
  el.className = `alert alert-${type} py-2 mb-3`;
  setTimeout(() => el.classList.add('d-none'), 4000);
}

async function loadStatus() {
  const res  = await fetch('/admin/api/status');
  const data = await res.json();
  document.getElementById('sapDb').textContent = data.companyDb || '—';
  const dbs = data.databases || [];
  document.getElementById('sapDbs').innerHTML = dbs
    .map(d => `<span class="badge bg-light text-dark border me-1">${d}</span>`).join('');
  const sel = document.getElementById('testDbSelect');
  sel.innerHTML = dbs.map(d => `<option value="${d}">${d}</option>`).join('');
}

async function loadSettings() {
  const res  = await fetch('/admin/api/settings');
  const data = await res.json();

  document.getElementById('waPhoneId').value = data.WA_PHONE_NUMBER_ID || '';
  document.getElementById('waVerify').value  = data.WA_VERIFY_TOKEN    || '';

  document.getElementById('waTokenStatus').textContent =
    data.WA_ACCESS_TOKEN_SET ? '✓ Token kayıtlı (değiştirmek için yeni token gir)' : '⚠ Token tanımlı değil';
  document.getElementById('anthropicKeyStatus').textContent =
    data.ANTHROPIC_API_KEY_SET ? '✓ API Key kayıtlı (değiştirmek için yeni key gir)' : '⚠ API Key tanımlı değil';

  document.getElementById('sqlServer').value = data.SAP_DB_SERVER || '';
  document.getElementById('sqlDb').value     = data.SAP_DB_NAME   || '';
  document.getElementById('sqlUser').value   = data.SAP_DB_USER   || '';
  document.getElementById('sqlPasswordStatus').textContent =
    data.SAP_DB_PASSWORD_SET ? '✓ Şifre kayıtlı (değiştirmek için yeni şifre gir)' : '⚠ Şifre tanımlı değil';
}

async function saveSqlSettings() {
  const body = {
    SAP_DB_SERVER: document.getElementById('sqlServer').value.trim(),
    SAP_DB_NAME:   document.getElementById('sqlDb').value.trim(),
    SAP_DB_USER:   document.getElementById('sqlUser').value.trim(),
  };
  const pw = document.getElementById('sqlPassword').value.trim();
  if (pw) body.SAP_DB_PASSWORD = pw;

  const res  = await fetch('/admin/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (res.ok) {
    showAlert('SQL veritabanı ayarları kaydedildi');
    document.getElementById('sqlPassword').value = '';
    loadSettings();
  } else {
    showAlert(data.error, 'danger');
  }
}

async function testSqlDb() {
  const btn    = document.getElementById('testSqlBtn');
  const result = document.getElementById('sqlTestResult');
  btn.disabled = true;
  result.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
  try {
    const res  = await fetch('/admin/api/test-sqldb', { method: 'POST' });
    const data = await res.json();
    result.innerHTML = data.ok
      ? '<span class="text-success"><i class="bi bi-check-circle-fill me-1"></i>SQL bağlantısı başarılı</span>'
      : `<span class="text-danger"><i class="bi bi-x-circle-fill me-1"></i>${data.error}</span>`;
  } catch {
    result.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle-fill me-1"></i>Sunucuya erişilemedi</span>';
  } finally {
    btn.disabled = false;
  }
}

async function saveSettings() {
  const body = {
    WA_PHONE_NUMBER_ID: document.getElementById('waPhoneId').value.trim(),
    WA_VERIFY_TOKEN:    document.getElementById('waVerify').value.trim(),
  };
  const token = document.getElementById('waToken').value.trim();
  if (token) body.WA_ACCESS_TOKEN = token;

  const res  = await fetch('/admin/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (res.ok) {
    showAlert('WhatsApp ayarları kaydedildi');
    document.getElementById('waToken').value = '';
    loadSettings();
  } else {
    showAlert(data.error, 'danger');
  }
}

async function saveAnthropicKey() {
  const key = document.getElementById('anthropicKey').value.trim();
  if (!key) return showAlert('API Key boş olamaz', 'danger');

  const res  = await fetch('/admin/api/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ANTHROPIC_API_KEY: key }),
  });
  const data = await res.json();
  if (res.ok) {
    showAlert('Anthropic API Key kaydedildi');
    document.getElementById('anthropicKey').value = '';
    loadSettings();
  } else {
    showAlert(data.error, 'danger');
  }
}

async function testSap() {
  const db     = document.getElementById('testDbSelect').value;
  const btn    = document.getElementById('testBtn');
  const result = document.getElementById('testResult');
  btn.disabled = true;
  result.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
  try {
    const res  = await fetch('/admin/api/test-sap', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ db }),
    });
    const data = await res.json();
    result.innerHTML = data.ok
      ? `<span class="text-success"><i class="bi bi-check-circle-fill me-1"></i>Bağlantı başarılı – ${data.sample?.CardCode || ''}: ${data.sample?.CardName || ''}</span>`
      : `<span class="text-danger"><i class="bi bi-x-circle-fill me-1"></i>${data.error}</span>`;
  } catch {
    result.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle-fill me-1"></i>Sunucuya erişilemedi</span>';
  } finally {
    btn.disabled = false;
  }
}

async function changePassword() {
  const cur    = document.getElementById('curPw').value;
  const nw     = document.getElementById('newPw').value;
  const nw2    = document.getElementById('newPw2').value;
  const alertEl = document.getElementById('pwAlert');
  alertEl.className = 'alert py-2 d-none';

  if (nw !== nw2) {
    alertEl.textContent = 'Yeni şifreler eşleşmiyor';
    alertEl.className = 'alert alert-danger py-2';
    return;
  }
  const res  = await fetch('/admin/api/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ currentPassword: cur, newPassword: nw }),
  });
  const data = await res.json();
  if (res.ok) {
    alertEl.textContent = 'Şifre başarıyla güncellendi';
    alertEl.className = 'alert alert-success py-2';
    ['curPw','newPw','newPw2'].forEach(id => document.getElementById(id).value = '');
  } else {
    alertEl.textContent = data.error;
    alertEl.className = 'alert alert-danger py-2';
  }
}

loadStatus();
loadSettings();
</script>
</body>
</html>
