<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mesaj Logları – SAP WA Bot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/admin/admin.css" rel="stylesheet">
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <i class="bi bi-robot sidebar-logo"></i>
      <div>
        <div class="sidebar-title">SAP WA Bot</div>
        <div class="sidebar-sub">Yönetim Paneli</div>
      </div>
    </div>
    <nav>
      <a href="/admin"           class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
      <a href="/admin/users"     class="nav-link"><i class="bi bi-people"></i> Kullanıcılar</a>
      <a href="/admin/approvers" class="nav-link"><i class="bi bi-people"></i> Onay Yetkilileri</a>
      <a href="/admin/templates" class="nav-link"><i class="bi bi-chat-square-text"></i> Şablonlar</a>
      <a href="/admin/tasks"     class="nav-link"><i class="bi bi-clock-history"></i> Zamanlanmış Görevler</a>
      <a href="/admin/logs"      class="nav-link active"><i class="bi bi-journal-text"></i> Mesaj Logları</a>
      <a href="/admin/settings"  class="nav-link"><i class="bi bi-gear"></i> Ayarlar</a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout" style="color:rgba(255,100,100,.7);text-decoration:none;font-size:.8rem">
        <i class="bi bi-box-arrow-right me-1"></i>Çıkış Yap
      </a>
    </div>
  </div>

  <!-- İçerik -->
  <div id="content">
    <div class="page-header">
      <h4><i class="bi bi-journal-text me-2" style="color:#6cb2eb"></i><span data-i18n="page_logs">Mesaj Logları</span></h4>
    </div>

    <!-- Filtre -->
    <div class="card mb-4">
      <div class="card-body py-3">
        <div class="row g-2 align-items-end">
          <div class="col-md-3">
            <label class="form-label text-muted mb-1" style="font-size:.8rem">Başlangıç Tarihi</label>
            <input type="date" id="fromDate" class="form-control form-control-sm">
          </div>
          <div class="col-md-3">
            <label class="form-label text-muted mb-1" style="font-size:.8rem">Bitiş Tarihi</label>
            <input type="date" id="toDate" class="form-control form-control-sm">
          </div>
          <div class="col-md-3">
            <label class="form-label text-muted mb-1" style="font-size:.8rem">Telefon Filtresi</label>
            <input type="text" id="phoneFilter" class="form-control form-control-sm" placeholder="905...">
          </div>
          <div class="col-md-3 d-flex gap-2">
            <button class="btn btn-primary btn-sm w-100" onclick="loadLogs()">
              <i class="bi bi-search me-1"></i>Ara
            </button>
            <button class="btn btn-outline-secondary btn-sm" onclick="exportCsv()" title="CSV İndir">
              <i class="bi bi-download"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Özet -->
    <div class="row g-3 mb-3" id="summary" style="display:none!important">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="bi bi-chat-dots"></i></div>
          <div><div class="stat-value" id="totalCount">0</div><div class="stat-label">Toplam Mesaj</div></div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon green"><i class="bi bi-arrow-down-circle"></i></div>
          <div><div class="stat-value" id="inCount">0</div><div class="stat-label">Gelen</div></div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon orange"><i class="bi bi-arrow-up-circle"></i></div>
          <div><div class="stat-value" id="outCount">0</div><div class="stat-label">Giden</div></div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="bi bi-people"></i></div>
          <div><div class="stat-value" id="uniquePhones">0</div><div class="stat-label">Tekil Kullanıcı</div></div>
        </div>
      </div>
    </div>

    <!-- Tablo -->
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-list-ul me-2"></i>Kayıtlar</span>
        <span class="badge bg-secondary" id="rowCount">—</span>
      </div>
      <div class="card-body p-0">
        <div id="logArea" class="text-center py-5 text-muted" style="font-size:.9rem">
          Tarih aralığı seçip Ara butonuna basın.
        </div>
        <div class="table-responsive" id="tableWrap" style="display:none">
          <table class="table table-sm table-hover mb-0" style="font-size:.82rem">
            <thead class="table-dark">
              <tr>
                <th style="width:140px">Zaman</th>
                <th style="width:120px">Telefon</th>
                <th style="width:60px">Yön</th>
                <th>Mesaj / Önizleme</th>
              </tr>
            </thead>
            <tbody id="logBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let _allRows = [];

function today() {
  return new Date().toISOString().split('T')[0];
}

document.getElementById('fromDate').value = today();
document.getElementById('toDate').value   = today();

async function loadLogs() {
  const from  = document.getElementById('fromDate').value;
  const to    = document.getElementById('toDate').value;
  const phone = document.getElementById('phoneFilter').value.trim();

  if (!from || !to) return alert('Lütfen tarih aralığı seçin.');

  document.getElementById('logArea').textContent = 'Yükleniyor...';
  document.getElementById('logArea').style.display = '';
  document.getElementById('tableWrap').style.display = 'none';
  document.getElementById('summary').style.display = 'none!important';

  try {
    const res  = await fetch(`/admin/api/logs?from=${from}&to=${to}`);
    const data = await res.json();

    _allRows = phone
      ? data.filter(r => (r.phone || '').includes(phone))
      : data;

    renderTable(_allRows);
  } catch (err) {
    document.getElementById('logArea').textContent = 'Hata: ' + err.message;
  }
}

function renderTable(rows) {
  const tbody = document.getElementById('logBody');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    document.getElementById('logArea').textContent = 'Kayıt bulunamadı.';
    document.getElementById('logArea').style.display = '';
    document.getElementById('tableWrap').style.display = 'none';
    document.getElementById('summary').style.removeProperty('display');
    document.getElementById('summary').style.display = 'none';
    updateSummary(rows);
    document.getElementById('rowCount').textContent = '0';
    return;
  }

  for (const r of rows) {
    const tr   = document.createElement('tr');
    const isIn = r.dir === 'in';

    const dirBadge = isIn
      ? '<span class="badge bg-success" style="font-size:.7rem">Gelen</span>'
      : '<span class="badge bg-warning text-dark" style="font-size:.7rem">Giden</span>';

    let msgCell;
    if (r.type === 'location' && r.latitude && r.longitude) {
      const mapsUrl = `https://www.google.com/maps?q=${r.latitude},${r.longitude}`;
      const label   = r.name || `${r.latitude}, ${r.longitude}`;
      msgCell = `<span class="badge bg-info text-dark me-1" style="font-size:.7rem">📍 Konum</span>
        <a href="${mapsUrl}" target="_blank" rel="noopener" style="font-size:.82rem">
          ${esc(label)}
          <i class="bi bi-box-arrow-up-right ms-1" style="font-size:.7rem"></i>
        </a>
        ${r.address ? `<span class="text-muted ms-1" style="font-size:.75rem">${esc(r.address)}</span>` : ''}`;
    } else {
      const msg = isIn ? (r.text || '') : (r.preview || `[${r.type || ''}]`);
      msgCell = `<span title="${esc(msg)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;max-width:480px">${esc(msg)}</span>`;
    }

    tr.innerHTML = `
      <td class="text-muted">${fmtTs(r.ts)}</td>
      <td style="font-family:monospace">${r.phone || ''}</td>
      <td>${dirBadge}</td>
      <td>${msgCell}</td>
    `;
    tbody.appendChild(tr);
  }

  document.getElementById('logArea').style.display = 'none';
  document.getElementById('tableWrap').style.display = '';
  document.getElementById('rowCount').textContent = rows.length + ' kayıt';
  updateSummary(rows);
  document.getElementById('summary').style.cssText = '';
}

function updateSummary(rows) {
  const inRows  = rows.filter(r => r.dir === 'in');
  const outRows = rows.filter(r => r.dir === 'out');
  const phones  = new Set(rows.map(r => r.phone)).size;
  document.getElementById('totalCount').textContent  = rows.length;
  document.getElementById('inCount').textContent     = inRows.length;
  document.getElementById('outCount').textContent    = outRows.length;
  document.getElementById('uniquePhones').textContent = phones;
}

function exportCsv() {
  if (!_allRows.length) return alert('Önce log arayın.');
  const header = 'Zaman,Telefon,Yön,Mesaj\n';
  const lines  = _allRows.map(r => {
    const msg = (r.dir === 'in' ? r.text : r.preview) || '';
    return [r.ts, r.phone, r.dir, `"${msg.replace(/"/g,'""')}"`].join(',');
  });
  const blob = new Blob([header + lines.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `logs_${document.getElementById('fromDate').value}_${document.getElementById('toDate').value}.csv`;
  a.click();
}

function fmtTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleDateString('tr-TR') + ' ' +
    d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
<script src="/admin/admin-i18n.js"></script>
</body>
</html>
